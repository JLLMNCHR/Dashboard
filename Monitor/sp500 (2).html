<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S&P 500 — Tiempo Real</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100vh; background: #0d1117; color: #e6edf3; font-family: sans-serif; display: flex; flex-direction: column; }
    #header { padding: 16px 24px 0; display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
    #header h1 { font-size: 18px; font-weight: 700; }
    #price { font-size: 28px; font-weight: 700; }
    #change { font-size: 14px; }
    #updated { font-size: 11px; color: #6b7280; margin-left: auto; }
    #ranges { padding: 10px 24px; display: flex; gap: 8px; }
    .rbtn { background: none; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 12px; padding: 4px 12px; cursor: pointer; }
    .rbtn.active { background: #22c55e; border-color: #22c55e; color: #000; font-weight: 700; }
    #chart-wrap { flex: 1; padding: 0 24px 24px; position: relative; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
    #msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #6b7280; text-align: center; line-height: 1.8; }
    #msg.hidden { display: none; }
    .up { color: #22c55e; }
    .down { color: #ef4444; }
  </style>
</head>
<body>

<div id="header">
  <h1>S&amp;P 500</h1>
  <span id="price">—</span>
  <span id="change">—</span>
  <span id="updated"></span>
</div>

<div id="ranges">
  <button class="rbtn" data-r="1d" data-i="5m">1D</button>
  <button class="rbtn" data-r="5d" data-i="15m">5D</button>
  <button class="rbtn active" data-r="1mo" data-i="1d">1M</button>
  <button class="rbtn" data-r="6mo" data-i="1d">6M</button>
  <button class="rbtn" data-r="1y" data-i="1wk">1A</button>
  <button class="rbtn" data-r="5y" data-i="1mo">5A</button>
</div>

<div id="chart-wrap">
  <canvas id="spx"></canvas>
  <div id="msg">Cargando datos...</div>
</div>

<script>
let chart = null;

// Lista de proxies CORS a intentar en orden
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`,
];

async function fetchYahoo(range, interval) {
  const yhUrl = `https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?range=${range}&interval=${interval}&includePrePost=false&events=history`;

  for (const makeProxy of PROXIES) {
    try {
      const res = await fetch(makeProxy(yhUrl), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const text = await res.text();

      // allorigins envuelve en {contents:...}
      let json;
      try { json = JSON.parse(text); } catch { continue; }
      if (json.contents) {
        try { json = JSON.parse(json.contents); } catch { continue; }
      }

      const result = json?.chart?.result?.[0];
      if (!result) continue;

      const ts = result.timestamp;
      const closes = result.indicators.quote[0].close;
      const meta = result.meta;

      const pairs = ts
        .map((t, i) => ({ t, c: closes[i] }))
        .filter(p => p.c != null);

      if (pairs.length === 0) continue;
      return { pairs, meta };
    } catch (_) { /* try next proxy */ }
  }
  throw new Error('Todos los proxies fallaron');
}

function fmtDate(ts, range) {
  const d = new Date(ts * 1000);
  if (range === '1d' || range === '5d') {
    return d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: range === '5y' ? 'numeric' : undefined });
}

function fmtNum(n) {
  return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function render({ pairs, meta }, range) {
  const labels = pairs.map(p => fmtDate(p.t, range));
  const values = pairs.map(p => p.c);
  const last = values[values.length - 1];
  const first = values[0];
  const pct = ((last - first) / first * 100);
  const isUp = pct >= 0;
  const color = isUp ? '#22c55e' : '#ef4444';

  // Header
  document.getElementById('price').textContent = fmtNum(last) + ' pts';
  const chEl = document.getElementById('change');
  chEl.textContent = (isUp ? '+' : '') + fmtNum(last - first) + '  (' + (isUp ? '+' : '') + pct.toFixed(2) + '%)';
  chEl.className = isUp ? 'up' : 'down';
  document.getElementById('updated').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-ES');

  // Chart
  if (chart) chart.destroy();
  const ctx = document.getElementById('spx').getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 400);
  grad.addColorStop(0, isUp ? 'rgba(34,197,94,0.25)' : 'rgba(239,68,68,0.25)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'S&P 500',
        data: values,
        borderColor: color,
        borderWidth: 2,
        backgroundColor: grad,
        fill: true,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: color,
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161b22',
          borderColor: '#30363d',
          borderWidth: 1,
          titleColor: '#8b949e',
          bodyColor: color,
          callbacks: { label: c => ' ' + fmtNum(c.raw) + ' pts' }
        }
      },
      scales: {
        x: {
          ticks: { color: '#6b7280', maxTicksLimit: 10, maxRotation: 0, font: { size: 11 } },
          grid: { color: '#161b22' }
        },
        y: {
          position: 'right',
          ticks: { color: '#6b7280', font: { size: 11 }, callback: v => v.toLocaleString('es-ES') },
          grid: { color: '#161b22' }
        }
      }
    }
  });
}

async function load(range, interval) {
  document.getElementById('msg').textContent = 'Cargando datos...';
  document.getElementById('msg').classList.remove('hidden');
  try {
    const data = await fetchYahoo(range, interval);
    render(data, range);
    document.getElementById('msg').classList.add('hidden');
  } catch (e) {
    document.getElementById('msg').innerHTML =
      '⚠ No se pudieron cargar los datos en tiempo real.<br><small>Yahoo Finance bloquea peticiones directas desde el navegador.<br>Prueba abriendo el archivo desde un servidor local o usa una extensión CORS.</small>';
  }
}

document.querySelectorAll('.rbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    load(btn.dataset.r, btn.dataset.i);
  });
});

load('1mo', '1d');
</script>
</body>
</html>
