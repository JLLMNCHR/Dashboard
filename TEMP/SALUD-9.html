<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SALUD · Indicadores económicos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      font-family: system-ui, 'Segoe UI', monospace;
      color: #eee;
      padding: 2rem 1rem;
    }

    .grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: #111118;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: transform 0.1s ease, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    /* colores de acento según estado */
    :root {
      --verde: #00e5a0;
      --rojo: #ff3c5a;
    }

    .card.green {
      border-left: 4px solid var(--verde);
    }
    .card.red {
      border-left: 4px solid var(--rojo);
    }

    /* texto coloreado para título y valor principal */
    .card.green .titulo,
    .card.green .valor-principal {
      color: var(--verde);
    }
    .card.red .titulo,
    .card.red .valor-principal {
      color: var(--rojo);
    }

    .titulo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
      transition: color 0.2s;
    }

    .subtitulo {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8888aa;
      margin-bottom: 1rem;
    }

    .valor-principal {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      margin: 0.75rem 0 0.25rem;
      font-family: monospace;
      transition: color 0.2s;
    }

    .cambio {
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      color: #bbb;
    }

    .estado {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #2a2a3a;
      display: flex;
      justify-content: space-between;
    }

    .leyenda {
      font-size: 0.7rem;
      color: #777;
      margin-top: 0.5rem;
    }

    .error-banner {
      max-width: 800px;
      margin: 1.5rem auto 0;
      background: #2a0f14;
      border: 1px solid #ff3c5a;
      border-radius: 12px;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      color: #ff9eae;
      text-align: center;
      display: none;
    }

    @media (max-width: 640px) {
      .valor-principal { font-size: 2.2rem; }
      .titulo { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="grid">
  <!-- VIX -->
  <a class="card" id="vixCard" href="https://finance.yahoo.com/quote/%5EVIX/" target="_blank" rel="noopener">
    <div class="titulo">VIX</div>
    <div class="subtitulo">Índice de Volatilidad CBOE</div>
    <div class="valor-principal" id="vixVal">---</div>
    <div class="cambio" id="vixCambio">cargando...</div>
    <div class="estado">
      <span id="vixEstado">—</span>
      <span>▼▲</span>
    </div>
    <div class="leyenda">Rango saludable: 15–25</div>
  </a>

  <!-- Jobless Claims -->
  <a class="card" id="clCard" href="https://fred.stlouisfed.org/series/ICSA" target="_blank" rel="noopener">
    <div class="titulo">Jobless Claims</div>
    <div class="subtitulo">Solicitudes de desempleo · semanal</div>
    <div class="valor-principal" id="clVal">---</div>
    <div class="cambio" id="clCambio">cargando...</div>
    <div class="estado">
      <span id="clEstado">—</span>
      <span>K</span>
    </div>
    <div class="leyenda">Umbral saludable: &lt; 250,000</div>
  </a>

  <!-- Dow Jones Transportation (cambio mensual como valor principal) -->
  <a class="card" id="djtCard" href="https://www.google.com/finance/quote/DJT:INDEXDJX" target="_blank" rel="noopener">
    <div class="titulo">Dow Jones Transp.</div>
    <div class="subtitulo">Rendimiento mensual · ^DJT</div>
    <div class="valor-principal" id="djtVal">---</div>
    <div class="cambio" id="djtCambio">precio actual: cargando...</div>
    <div class="estado">
      <span id="djtEstado">—</span>
      <span>mensual</span>
    </div>
    <div class="leyenda">▲ positivo / ▼ negativo</div>
  </a>
</div>

<div class="error-banner" id="errorMsg"></div>

<script>
  // ---------- PROXY ÚNICO ----------
  const PROXY = "https://corsproxy.io/?url=";

  async function fetchJSON(url) {
    const res = await fetch(PROXY + encodeURIComponent(url), {
      cache: "no-store",
      signal: AbortSignal.timeout(8000)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }

  // ---------- UTILS ----------
  function setCardColor(card, isGood) {
    card.classList.remove("green", "red");
    card.classList.add(isGood ? "green" : "red");
  }

  function flashElement(el) {
    if (!el) return;
    el.style.transition = "0.1s";
    el.style.opacity = "0.6";
    setTimeout(() => { el.style.opacity = "1"; }, 80);
    setTimeout(() => { el.style.transition = ""; }, 200);
  }

  const errorDiv = document.getElementById("errorMsg");
  function showError(msg) {
    errorDiv.style.display = "block";
    errorDiv.textContent = msg;
    setTimeout(() => {
      if (errorDiv.textContent === msg) errorDiv.style.display = "none";
    }, 8000);
  }

  // ---------- 1. VIX ----------
  const vixCard = document.getElementById("vixCard");
  const vixVal = document.getElementById("vixVal");
  const vixCambio = document.getElementById("vixCambio");
  const vixEstado = document.getElementById("vixEstado");

  async function fetchVIX() {
    try {
      const url = "https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1m&range=1d";
      const data = await fetchJSON(url);
      const meta = data?.chart?.result?.[0]?.meta;
      if (!meta) throw new Error("Sin datos VIX");
      const price = meta.regularMarketPrice;
      const prev = meta.chartPreviousClose;
      if (price == null || prev == null) throw new Error("Precio inválido");
      const change = price - prev;
      const pct = (change / prev) * 100;
      const sign = change >= 0 ? "+" : "";
      vixVal.innerText = price.toFixed(2);
      vixCambio.innerText = `${sign}${change.toFixed(2)} (${sign}${pct.toFixed(2)}%)`;
      const isGood = (price >= 15 && price <= 25);
      setCardColor(vixCard, isGood);
      vixEstado.innerText = isGood ? "Volatilidad normal" : (price < 15 ? "Volatilidad baja" : "Volatilidad alta");
      flashElement(vixVal);
    } catch (err) {
      console.error("VIX error:", err);
      vixEstado.innerText = "Error";
      showError(`VIX: ${err.message}`);
    }
  }

  // ---------- 2. JOBLESS CLAIMS ----------
  const clCard = document.getElementById("clCard");
  const clVal = document.getElementById("clVal");
  const clCambio = document.getElementById("clCambio");
  const clEstado = document.getElementById("clEstado");
  const FRED_KEY = "6dc1290379fe1d4a6fec81278325858d";

  async function fetchClaims() {
    try {
      const fredUrl = `https://api.stlouisfed.org/fred/series/observations?series_id=ICSA&api_key=${FRED_KEY}&file_type=json&sort_order=desc&limit=5`;
      const data = await fetchJSON(fredUrl);
      const obs = data?.observations?.filter(o => o.value && o.value !== "." && !isNaN(+o.value));
      if (!obs || obs.length < 1) throw new Error("Datos de desempleo no disponibles");
      const lastVal = +obs[0].value;
      const prevVal = obs[1] ? +obs[1].value : lastVal;
      const diff = lastVal - prevVal;
      const sign = diff >= 0 ? "+" : "";
      // formateo a K
      let displayVal = (lastVal / 1000).toFixed(1);
      clVal.innerText = displayVal + "K";
      clCambio.innerText = `${sign}${diff.toLocaleString()} vs semana anterior`;
      const isGood = lastVal < 250000;
      setCardColor(clCard, isGood);
      let fechaTexto = "";
      if (obs[0].date) {
        const fecha = new Date(obs[0].date + "T12:00:00Z");
        fechaTexto = ` · semana ${fecha.toLocaleDateString("es-ES", { day: "numeric", month: "short" })}`;
      }
      clEstado.innerText = (isGood ? "Mercado laboral sano" : "Nivel de alerta") + fechaTexto;
      flashElement(clVal);
    } catch (err) {
      console.error("Claims error:", err);
      clEstado.innerText = "Error";
      showError(`Jobless Claims: ${err.message}`);
    }
  }

  // ---------- 3. DOW JONES TRANSP. -> cambio mensual como valor principal ----------
  const djtCard = document.getElementById("djtCard");
  const djtVal = document.getElementById("djtVal");
  const djtCambio = document.getElementById("djtCambio");
  const djtEstado = document.getElementById("djtEstado");

  async function fetchDJT() {
    try {
      const url = "https://query1.finance.yahoo.com/v8/finance/chart/%5EDJT?interval=1d&range=1mo";
      const data = await fetchJSON(url);
      const result = data?.chart?.result?.[0];
      if (!result) throw new Error("Sin respuesta DJT");
      const closes = result.indicators?.quote?.[0]?.close?.filter(v => v !== null);
      if (!closes || closes.length < 2) throw new Error("No hay datos históricos suficientes");
      const current = closes[closes.length - 1];
      const oldest = closes[0];
      if (!current || !oldest) throw new Error("Precios nulos");
      const changePct = ((current - oldest) / oldest) * 100;
      const sign = changePct >= 0 ? "+" : "";
      // Mostrar el porcentaje como valor principal
      djtVal.innerText = `${sign}${changePct.toFixed(2)}%`;
      // Mostrar precio actual como referencia en el campo "cambio"
      djtCambio.innerText = `precio actual: ${current.toFixed(2)} USD`;
      const isPositive = changePct >= 0;
      setCardColor(djtCard, isPositive);
      djtEstado.innerText = isPositive ? "Rendimiento positivo ↑" : "Rendimiento negativo ↓";
      flashElement(djtVal);
    } catch (err) {
      console.error("DJT error:", err);
      djtEstado.innerText = "Error";
      showError(`Dow Jones Transp.: ${err.message}`);
    }
  }

  // ---------- ACTUALIZACIÓN PERIÓDICA ----------
  function updateAll() {
    fetchVIX();
    fetchClaims();
    fetchDJT();
  }

  updateAll();
  setInterval(updateAll, 60000);
</script>
</body>
</html>
