<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S&P 500</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100vh; background: #0d1117; display: flex; flex-direction: column; }
    canvas { display: block; }
    #chart-container { flex: 1; padding: 24px; }
  </style>
</head>
<body>
<div id="chart-container">
  <canvas id="spx"></canvas>
</div>

const labels = data.map(d => d[0]);
const values = data.map(d => d[1]);

const ctx = document.getElementById('spx').getContext('2d');

const gradient = ctx.createLinearGradient(0, 0, 0, 500);
gradient.addColorStop(0, 'rgba(34,197,94,0.3)');
gradient.addColorStop(1, 'rgba(34,197,94,0.0)');

new Chart(ctx, {
  type: 'line',
  data: {
    labels,
    datasets: [{
      label: 'S&P 500',
      data: values,
      borderColor: '#22c55e',
      borderWidth: 2,
      backgroundColor: gradient,
      fill: true,
      pointRadius: 0,
      pointHoverRadius: 5,
      pointHoverBackgroundColor: '#22c55e',
      tension: 0.3
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        labels: {
          color: '#9ca3af',
          font: { size: 13 }
        }
      },
      tooltip: {
        backgroundColor: '#1f2937',
        borderColor: '#374151',
        borderWidth: 1,
        titleColor: '#9ca3af',
        bodyColor: '#22c55e',
        callbacks: {
          label: ctx => ' ' + ctx.raw.toLocaleString('es-ES', { minimumFractionDigits: 2 }) + ' pts'
        }
      }
    },
    scales: {
      x: {
        ticks: {
          color: '#6b7280',
          maxTicksLimit: 12,
          maxRotation: 0,
          font: { size: 11 }
        },
        grid: { color: '#1f2937' }
      },
      y: {
        position: 'right',
        ticks: {
          color: '#6b7280',
          font: { size: 11 },
          callback: v => v.toLocaleString('es-ES')
        },
        grid: { color: '#1f2937' }
      }
    }
  }
});
</script>
</body>
</html>
