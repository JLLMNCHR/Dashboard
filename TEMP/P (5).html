<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>4-WALL-STREET</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js">
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100vh; background: #0d1117; color: #e6edf3; font-family: sans-serif; display: flex; flex-direction: column; }
    
    #global-header { padding: 16px 24px 8px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    #global-updated { font-size: 11px; color: #6b7280; }
    
    #ranges { padding: 8px 24px 12px; display: flex; gap: 8px; }
    .rbtn { background: none; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 12px; padding: 4px 12px; cursor: pointer; }
    .rbtn.active { background: #22c55e; border-color: #22c55e; color: #000; font-weight: 700; }
    
    #grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 16px; padding: 0 24px 24px; min-height: 0; }
    
    .panel { background: #111820; border: 1px solid #1a2332; border-radius: 10px; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .panel-header { padding: 12px 16px 4px; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .panel-header h2 { font-size: 14px; font-weight: 600; }
    .panel-price { font-size: 20px; font-weight: 700; }
    .panel-change { font-size: 12px; }
    .panel-chart { flex: 1; position: relative; min-height: 0; padding: 0 8px 8px; }
    .panel-chart canvas { width: 100% !important; height: 100% !important; }
    .panel-msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #6b7280; text-align: center; }
    .panel-msg.hidden { display: none; }
    
    .up { color: #22c55e; }
    .down { color: #ef4444; }
    
    @media (max-width: 768px) {
      #grid { grid-template-columns: 1fr; grid-template-rows: auto; }
      .panel { min-height: 300px; }
    }
  </style>
</head>
<body>

<div id="global-header">
  <span id="global-updated"></span>
</div>

<div id="ranges">
  <button class="rbtn" data-r="1d" data-i="5m">1D</button>
  <button class="rbtn" data-r="5d" data-i="15m">5D</button>
  <button class="rbtn active" data-r="1mo" data-i="1d">1M</button>
  <button class="rbtn" data-r="6mo" data-i="1d">6M</button>
  <button class="rbtn" data-r="1y" data-i="1wk">1A</button>
  <button class="rbtn" data-r="5y" data-i="1mo">5A</button>
</div>

<div id="grid">
  <!-- S&P 500 -->
  <div class="panel" data-symbol="%5EGSPC" data-name="S&P 500">
    <div class="panel-header">
      <h2>S&P 500</h2>
      <span class="panel-price">—</span>
      <span class="panel-change">—</span>
    </div>
    <div class="panel-chart">
      <canvas></canvas>
      <div class="panel-msg">Cargando...</div>
    </div>
  </div>
  
  <!-- Nasdaq -->
  <div class="panel" data-symbol="%5EIXIC" data-name="Nasdaq">
    <div class="panel-header">
      <h2>Nasdaq</h2>
      <span class="panel-price">—</span>
      <span class="panel-change">—</span>
    </div>
    <div class="panel-chart">
      <canvas></canvas>
      <div class="panel-msg">Cargando...</div>
    </div>
  </div>
  
  <!-- Russell 2000 -->
  <div class="panel" data-symbol="%5ERUT" data-name="Russell 2000">
    <div class="panel-header">
      <h2>Russell 2000</h2>
      <span class="panel-price">—</span>
      <span class="panel-change">—</span>
    </div>
    <div class="panel-chart">
      <canvas></canvas>
      <div class="panel-msg">Cargando...</div>
    </div>
  </div>
  
  <!-- Dow Jones -->
  <div class="panel" data-symbol="%5EDJI" data-name="Dow Jones">
    <div class="panel-header">
      <h2>Dow Jones</h2>
      <span class="panel-price">—</span>
      <span class="panel-change">—</span>
    </div>
    <div class="panel-chart">
      <canvas></canvas>
      <div class="panel-msg">Cargando...</div>
    </div>
  </div>
</div>

<script>
// Almacenar instancias de Chart por panel
const charts = {};

// Lista de proxies CORS a intentar en orden
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`,
];

async function fetchYahoo(symbol, range, interval) {
  const yhUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=${range}&interval=${interval}&includePrePost=false&events=history`;

  for (const makeProxy of PROXIES) {
    try {
      const res = await fetch(makeProxy(yhUrl), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const text = await res.text();

      let json;
      try { json = JSON.parse(text); } catch { continue; }
      if (json.contents) {
        try { json = JSON.parse(json.contents); } catch { continue; }
      }

      const result = json?.chart?.result?.[0];
      if (!result) continue;

      const ts = result.timestamp;
      const closes = result.indicators.quote[0].close;
      const meta = result.meta;

      const pairs = ts
        .map((t, i) => ({ t, c: closes[i] }))
        .filter(p => p.c != null);

      if (pairs.length === 0) continue;
      return { pairs, meta };
    } catch (_) { /* try next proxy */ }
  }
  throw new Error('Todos los proxies fallaron');
}

function fmtDate(ts, range) {
  const d = new Date(ts * 1000);
  if (range === '1d' || range === '5d') {
    return d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: range === '5y' ? 'numeric' : undefined });
}

function fmtNum(n) {
  return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderPanel(panel, { pairs, meta }, range) {
  const labels = pairs.map(p => fmtDate(p.t, range));
  const values = pairs.map(p => p.c);
  const last = values[values.length - 1];
  const first = values[0];
  const pct = ((last - first) / first * 100);
  const isUp = pct >= 0;
  const color = isUp ? '#22c55e' : '#ef4444';

  // Actualizar header del panel
  const priceEl = panel.querySelector('.panel-price');
  const changeEl = panel.querySelector('.panel-change');
  priceEl.textContent = fmtNum(last);
  changeEl.textContent = (isUp ? '+' : '') + fmtNum(last - first) + ' (' + (isUp ? '+' : '') + pct.toFixed(2) + '%)';
  changeEl.className = 'panel-change ' + (isUp ? 'up' : 'down');

  // Ocultar mensaje de carga
  panel.querySelector('.panel-msg').classList.add('hidden');

  // Crear o actualizar gráfico
  const canvas = panel.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const panelId = panel.dataset.symbol;

  if (charts[panelId]) charts[panelId].destroy();

  const grad = ctx.createLinearGradient(0, 0, 0, 300);
  grad.addColorStop(0, isUp ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');

  charts[panelId] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: panel.dataset.name,
        data: values,
        borderColor: color,
        borderWidth: 1.5,
        backgroundColor: grad,
        fill: true,
        pointRadius: 0,
        pointHoverRadius: 3,
        pointHoverBackgroundColor: color,
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161b22',
          borderColor: '#30363d',
          borderWidth: 1,
          titleColor: '#8b949e',
          bodyColor: color,
          callbacks: { label: c => ' ' + fmtNum(c.raw) + ' pts' }
        }
      },
      scales: {
        x: {
          ticks: { color: '#6b7280', maxTicksLimit: 8, maxRotation: 0, font: { size: 10 } },
          grid: { color: '#161b22' }
        },
        y: {
          position: 'right',
          ticks: { color: '#6b7280', font: { size: 10 }, callback: v => v.toLocaleString('es-ES') },
          grid: { color: '#161b22' }
        }
      }
    }
  });
}

function showPanelError(panel) {
  panel.querySelector('.panel-msg').innerHTML = '⚠ Error al cargar';
  panel.querySelector('.panel-msg').classList.remove('hidden');
  panel.querySelector('.panel-price').textContent = '—';
  panel.querySelector('.panel-change').textContent = '—';
}

async function loadPanel(panel, range, interval) {
  const symbol = panel.dataset.symbol;
  panel.querySelector('.panel-msg').textContent = 'Cargando...';
  panel.querySelector('.panel-msg').classList.remove('hidden');
  
  try {
    const data = await fetchYahoo(symbol, range, interval);
    renderPanel(panel, data, range);
  } catch (e) {
    showPanelError(panel);
  }
}

async function loadAll(range, interval) {
  document.getElementById('global-updated').textContent = 'Actualizando...';
  
  const panels = document.querySelectorAll('.panel');
  const promises = Array.from(panels).map(panel => loadPanel(panel, range, interval));
  
  await Promise.allSettled(promises);
  
  document.getElementById('global-updated').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-ES');
}

// Event listeners para botones de rango
document.querySelectorAll('.rbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadAll(btn.dataset.r, btn.dataset.i);
  });
});

// Carga inicial
loadAll('1mo', '1d');
</script>
</body>
</html>
