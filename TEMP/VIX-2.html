<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIX — Índice de Volatilidad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --panel: #111118;
      --border: #1e1e2e;
      --text-dim: #44445a;
      --text-mid: #7777a0;
      --green: #00e5a0;
      --green-glow: rgba(0, 229, 160, 0.35);
      --red: #ff3c5a;
      --red-glow: rgba(255, 60, 90, 0.35);
      --neutral: #5555ff;
      --accent: var(--neutral);
      --glow: rgba(85, 85, 255, 0.25);
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial ambient */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, var(--glow), transparent 70%);
      pointer-events: none;
      z-index: 0;
      transition: background 1s ease;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── LABEL ABOVE ── */
    .label-top {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .label-top::before,
    .label-top::after {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background: var(--border);
    }

    /* ── CARD ── */
    .card {
      position: relative;
      width: 340px;
      padding: 36px 40px 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel);
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: transform 0.2s ease, border-color 0.6s ease, box-shadow 0.6s ease;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px) scale(1.01);
    }

    /* Corner marks */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.6;
      transition: border-color 0.6s ease;
    }
    .card::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

    /* Scan line sweep */
    .card .scan {
      position: absolute;
      top: -100%;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.02), transparent);
      animation: scan 4s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0%   { top: -40%; }
      100% { top: 120%; }
    }

    /* ── HEADER ROW ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
    }
    .ticker {
      font-family: var(--font-display);
      font-size: 15px;
      letter-spacing: 0.2em;
      color: var(--text-mid);
    }
    .badge {
      font-size: 9px;
      letter-spacing: 0.2em;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* ── VALUE ── */
    .value-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }
    .value {
      font-family: var(--font-display);
      font-size: 88px;
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--accent);
      text-shadow: 0 0 40px var(--glow);
      transition: color 0.6s ease, text-shadow 0.6s ease;
    }
    .decimals {
      font-family: var(--font-display);
      font-size: 36px;
      color: var(--accent);
      opacity: 0.6;
      transition: color 0.6s ease;
      align-self: flex-end;
      padding-bottom: 8px;
    }

    /* ── CHANGE ── */
    .change-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .change {
      font-size: 13px;
      color: var(--text-mid);
    }
    .arrow { font-size: 11px; }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin-bottom: 20px;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status-text {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      transition: color 0.6s ease;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--glow);
      animation: pulse 2s ease infinite;
      transition: background 0.6s ease, box-shadow 0.6s ease;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── TIMESTAMP ── */
    .timestamp {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-align: center;
    }

    /* ── RANGE HINT ── */
    .range-hint {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-align: center;
    }
    .range-hint span {
      color: var(--text-mid);
    }

    /* ── ERROR ── */
    .error-msg {
      display: none;
      font-size: 10px;
      color: var(--red);
      letter-spacing: 0.15em;
      text-align: center;
      margin-top: -8px;
    }

    /* STATE: GREEN */
    body.state-green {
      --accent: var(--green);
      --glow: var(--green-glow);
    }
    body.state-green body::after { background: radial-gradient(ellipse 60% 50% at 50% 50%, var(--green-glow), transparent 70%); }

    /* STATE: RED */
    body.state-red {
      --accent: var(--red);
      --glow: var(--red-glow);
    }

    /* Blink on update */
    @keyframes flashBlink {
      0%, 100% { opacity: 1; }
      30% { opacity: 0.1; }
      60% { opacity: 1; }
    }
    .flash { animation: flashBlink 0.4s ease; }
  </style>
</head>
<body class="state-neutral" id="bodyEl">

  <div class="wrapper">
    <div class="label-top">Índice de Volatilidad CBOE</div>

    <a class="card" id="cardLink" href="https://finance.yahoo.com/quote/%5EVIX/" target="_blank" rel="noopener">
      <div class="scan"></div>

      <div class="header">
        <div class="ticker">^VIX</div>
        <div class="badge">Tiempo real</div>
      </div>

      <div class="value-row">
        <div class="value" id="valInt">--</div>
        <div class="decimals" id="valDec">.--</div>
      </div>

      <div class="change-row">
        <span class="arrow" id="arrowEl">→</span>
        <span class="change" id="changeEl">cargando…</span>
      </div>

      <div class="divider"></div>

      <div class="status-bar">
        <div class="status-text" id="statusText">Conectando</div>
        <div class="status-dot" id="statusDot"></div>
      </div>
    </a>

    <div class="timestamp" id="tsEl">Última actualización: —</div>
    <div class="range-hint">Zona segura: <span>15 – 25</span> &nbsp;·&nbsp; Fuera de rango: alerta</div>
    <div class="error-msg" id="errorMsg">Error al obtener datos. Reintentando…</div>
  </div>

  <script>
    // ── Configuración ──────────────────────────────────────────
    const REFRESH_MS   = 60_000;   // cada 60 s
    const PROXY        = 'https://api.allorigins.win/raw?url=';
    const YAHOO_URL    = encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1m&range=1d');
    const GREEN_LOW    = 15;
    const GREEN_HIGH   = 25;

    // ── DOM refs ───────────────────────────────────────────────
    const bodyEl    = document.getElementById('bodyEl');
    const valInt    = document.getElementById('valInt');
    const valDec    = document.getElementById('valDec');
    const changeEl  = document.getElementById('changeEl');
    const arrowEl   = document.getElementById('arrowEl');
    const statusText= document.getElementById('statusText');
    const tsEl      = document.getElementById('tsEl');
    const errorMsg  = document.getElementById('errorMsg');
    const cardLink  = document.getElementById('cardLink');

    let prevValue   = null;

    // ── Helpers ────────────────────────────────────────────────
    function setColor(value) {
      bodyEl.classList.remove('state-green', 'state-red', 'state-neutral');
      if (value >= GREEN_LOW && value <= GREEN_HIGH) {
        bodyEl.classList.add('state-green');
        statusText.textContent = 'Volatilidad Normal';
      } else {
        bodyEl.classList.add('state-red');
        statusText.textContent = value < GREEN_LOW ? 'Volatilidad Baja' : 'Volatilidad Alta';
      }
    }

    function flashCard() {
      valInt.classList.remove('flash');
      valDec.classList.remove('flash');
      void valInt.offsetWidth; // reflow
      valInt.classList.add('flash');
      valDec.classList.add('flash');
    }

    function pad(n) { return n < 10 ? '0' + n : n; }

    function fmtTime(d) {
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function showError(msg) {
      errorMsg.style.display = 'block';
      errorMsg.textContent   = msg || 'Error al obtener datos. Reintentando…';
      statusText.textContent = 'Error';
    }

    function hideError() { errorMsg.style.display = 'none'; }

    // ── Fetch ──────────────────────────────────────────────────
    async function fetchVIX() {
      try {
        const res = await fetch(PROXY + YAHOO_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();

        const meta   = json?.chart?.result?.[0]?.meta;
        if (!meta) throw new Error('Estructura inesperada');

        const price  = meta.regularMarketPrice ?? meta.chartPreviousClose;
        const prev   = meta.chartPreviousClose  ?? meta.previousClose ?? price;
        const change = price - prev;
        const pct    = ((change / prev) * 100);

        if (price === undefined || price === null) throw new Error('Sin precio');

        hideError();

        // Separar entero y decimal
        const [intPart, decPart] = price.toFixed(2).split('.');
        valInt.textContent = intPart;
        valDec.textContent = '.' + decPart;

        // Cambio
        const sign = change >= 0 ? '+' : '';
        changeEl.textContent = `${sign}${change.toFixed(2)} (${sign}${pct.toFixed(2)}%)`;
        arrowEl.textContent  = change >= 0 ? '↑' : '↓';

        // Color
        setColor(price);

        // Flash si cambia
        if (prevValue !== null && prevValue !== price) flashCard();
        prevValue = price;

        // Timestamp
        tsEl.textContent = `Última actualización: ${fmtTime(new Date())}`;

      } catch (err) {
        console.error('[VIX]', err);
        showError(`Error al obtener datos. Reintentando… (${err.message})`);
      }
    }

    // ── Bootstrap ──────────────────────────────────────────────
    fetchVIX();
    setInterval(fetchVIX, REFRESH_MS);
  </script>
</body>
</html>
